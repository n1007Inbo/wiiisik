name: Pinterest Pro Bulk System

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Select Mode'
        required: true
        default: 'both'
        type: choice
        options:
          - 'collect_urls'
          - 'extract_data'
          - 'both'

jobs:
  pinterest_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install playwright
          playwright install chromium

      - name: Mode - Collect URLs
        if: github.event.inputs.mode == 'collect_urls' || github.event.inputs.mode == 'both'
        run: |
          cd 1_URL_Collector
          python bulk_collector.py
          # Move collected URLs to Extractor's input for 'both' mode
          mkdir -p ../2_Data_Extractor/inputs
          cp collected_urls/*.csv ../2_Data_Extractor/inputs/ || echo "No URLs collected"

      - name: Mode - Extract Data
        if: github.event.inputs.mode == 'extract_data' || github.event.inputs.mode == 'both'
        run: |
          cd 2_Data_Extractor
          python bulk_extractor.py

      - name: Commit and Push Results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Auto-update Pinterest data [skip ci]" || echo "No changes to commit"
          git push
